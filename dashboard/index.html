<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>LIHTC Agent Dashboard</title>
    <style>
      body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial; margin: 24px; }
      .row { display: flex; gap: 16px; flex-wrap: wrap; }
      .card { border: 1px solid #ddd; border-radius: 10px; padding: 14px; min-width: 320px; }
      code { background: #f6f6f6; padding: 2px 6px; border-radius: 6px; }
      table { border-collapse: collapse; width: 100%; }
      th, td { border-bottom: 1px solid #eee; padding: 6px 8px; text-align: left; font-size: 13px; }
      th { background: #fafafa; }
    </style>
  </head>
  <body>
    <h2>LIHTC TX 2026 — Agent Dashboard</h2>
    <p>Load one of:</p>
    <ul>
      <li><code>report.json</code> (accuracy by strategy)</li>
      <li><code>run_summary.json</code> (one run)</li>
      <li><code>benchmark.json</code> (speed + review counts across strategies)</li>
      <li><code>audit.json</code> (evidence support checks)</li>
    </ul>

    <div class="row">
      <div class="card">
        <h3>Load JSON</h3>
        <input type="file" id="file" accept="application/json" />
        <pre id="meta"></pre>
      </div>
      <div class="card" style="flex: 1;">
        <h3>Results</h3>
        <div id="tables"></div>
      </div>
    </div>

    <script>
      const fileInput = document.getElementById("file");
      const meta = document.getElementById("meta");
      const tables = document.getElementById("tables");

      function renderEvalReport(report) {
        tables.innerHTML = "";
        const names = Object.keys(report || {});
        meta.textContent = `type: eval report\nstrategies: ${names.join(", ")}`;
        for (const s of names) {
          const r = report[s];
          const acc = r.accuracy || {};
          const card = document.createElement("div");
          card.className = "card";
          const h = document.createElement("h4");
          h.textContent = s;
          card.appendChild(h);

          const tbl = document.createElement("table");
          const thead = document.createElement("thead");
          thead.innerHTML = "<tr><th>Field</th><th>Accuracy</th></tr>";
          tbl.appendChild(thead);
          const tbody = document.createElement("tbody");
          for (const [k, v] of Object.entries(acc)) {
            const tr = document.createElement("tr");
            const vv = (v === null || v === undefined) ? "" : (Math.round(v * 1000) / 10) + "%";
            tr.innerHTML = `<td>${k}</td><td>${vv}</td>`;
            tbody.appendChild(tr);
          }
          tbl.appendChild(tbody);
          card.appendChild(tbl);
          tables.appendChild(card);
        }
      }

      function renderRunSummary(sum) {
        tables.innerHTML = "";
        meta.textContent = `type: run summary\npdf_dir: ${sum.pdf_dir || ""}\nmodel: ${sum.model || ""}`;
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <h4>Run</h4>
          <table>
            <tr><th>PDFs processed</th><td>${sum.count_pdfs ?? ""}</td></tr>
            <tr><th>Needs review</th><td>${sum.count_needs_review ?? ""}</td></tr>
            <tr><th>Model</th><td>${sum.model ?? ""}</td></tr>
            <tr><th>Max pages</th><td>${sum.max_pages ?? ""}</td></tr>
          </table>
          <p><b>Outputs</b></p>
          <pre>${JSON.stringify(sum.outputs || {}, null, 2)}</pre>
        `;
        tables.appendChild(card);
      }

      function renderBenchmark(b) {
        tables.innerHTML = "";
        meta.textContent = `type: benchmark\npdf_dir: ${b.pdf_dir || ""}\nmodel: ${b.model || ""}\ncount_pdfs: ${b.count_pdfs ?? ""}`;
        const card = document.createElement("div");
        card.className = "card";
        const rows = (b.strategies || []).slice().sort((a, c) => (a.elapsed_s || 0) - (c.elapsed_s || 0));
        let html = `<h4>Strategy benchmark</h4><table><thead><tr>
          <th>Strategy</th><th>Elapsed (s)</th><th>Avg/PDF (s)</th><th>Needs review</th><th>Out dir</th>
        </tr></thead><tbody>`;
        for (const r of rows) {
          html += `<tr>
            <td>${r.strategy}</td>
            <td>${r.elapsed_s ?? ""}</td>
            <td>${Math.round((r.avg_pdf_s || 0) * 10) / 10}</td>
            <td>${r.needs_review ?? ""}</td>
            <td><code>${r.out_dir || ""}</code></td>
          </tr>`;
        }
        html += `</tbody></table>`;
        card.innerHTML = html;
        tables.appendChild(card);
      }

      function renderAudit(a) {
        tables.innerHTML = "";
        const counts = a.issue_counts || {};
        meta.textContent = `type: audit\nrun_dir: ${a.run_dir || ""}\nrecords: ${a.count_records ?? ""}`;
        const card = document.createElement("div");
        card.className = "card";
        let html = `<h4>Audit issues</h4><table><thead><tr><th>Issue</th><th>Count</th></tr></thead><tbody>`;
        for (const [k, v] of Object.entries(counts)) {
          html += `<tr><td>${k}</td><td>${v}</td></tr>`;
        }
        html += `</tbody></table>`;
        card.innerHTML = html;
        tables.appendChild(card);
      }

      fileInput.addEventListener("change", async (e) => {
        const f = e.target.files?.[0];
        if (!f) return;
        const text = await f.text();
        const obj = JSON.parse(text);
        if (obj && typeof obj === "object" && !Array.isArray(obj) && (obj.llm_single_pass || obj.llm_two_pass)) {
          renderEvalReport(obj);
          return;
        }
        if (obj && typeof obj === "object" && ("count_pdfs" in obj) && ("outputs" in obj)) {
          renderRunSummary(obj);
          return;
        }
        if (obj && typeof obj === "object" && ("strategies" in obj) && ("count_pdfs" in obj) && ("pdf_dir" in obj)) {
          renderBenchmark(obj);
          return;
        }
        if (obj && typeof obj === "object" && ("issue_counts" in obj) && ("records" in obj)) {
          renderAudit(obj);
          return;
        }
        meta.textContent = "Unrecognized JSON shape. Load report.json or run_summary.json.";
      });

      async function tryAutoLoad() {
        // Auto-load works when this dashboard is served over http(s) so fetch() can read JSON paths.
        // Example:
        //   python3 -m http.server 8000
        //   open http://localhost:8000/dashboard/index.html?bench=out_bench_demo/benchmark.json
        const params = new URLSearchParams(window.location.search);
        const bench = params.get("bench");
        const run = params.get("run");
        const evalReport = params.get("eval");
        const target = bench || run || evalReport;
        if (!target) return;

        async function fetchJson(path) {
          const res = await fetch(path, { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return await res.json();
        }

        try {
          let obj;
          try {
            obj = await fetchJson(target);
          } catch (e1) {
            // Common case: dashboard is served at /dashboard/, but JSON lives at repo root.
            // If target is relative, try one level up.
            if (!target.startsWith("/") && !target.startsWith("http")) {
              obj = await fetchJson("../" + target);
            } else {
              throw e1;
            }
          }
          if (bench) return renderBenchmark(obj);
          if (run) return renderRunSummary(obj);
          if (evalReport) return renderEvalReport(obj);
        } catch (e) {
          meta.textContent =
            "Auto-load failed (likely opened as file://). " +
            "Serve this folder with a local web server or use the file picker.\n" +
            `Error: ${String(e)}`;
        }
      }

      tryAutoLoad();
    </script>
  </body>
</html>
